<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刷题小程序系统 v1.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #fff;
    }
    h1 { font-size: 32px; margin-bottom: 4px; }
    p { opacity: 0.8; font-size: 15px; margin-bottom: 40px; }
    .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 32px 36px; text-align: center;
      width: 220px; cursor: pointer; text-decoration: none; color: #fff;
      transition: transform 0.2s, background 0.2s;
    }
    .card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.25); }
    .card .icon { font-size: 48px; margin-bottom: 16px; }
    .card h2 { font-size: 20px; margin-bottom: 8px; }
    .card p { font-size: 13px; opacity: 0.7; margin-bottom: 0; }
    .footer { margin-top: 60px; font-size: 13px; opacity: 0.5; }
  </style>
</head>
<body>
  <h1>刷题小程序系统</h1>
  <p>v1.0 · 收费刷题 + 题库管理后台</p>
  <div class="cards">
    <a class="card" href="/admin/">
      <div class="icon">🖥</div>
      <h2>后台管理</h2>
      <p>题库管理 · 套餐配置 · 序列号生成 · 用户管理</p>
    </a>
    <a class="card" href="/user/">
      <div class="icon">📱</div>
      <h2>用户端 (H5)</h2>
      <p>序列号激活 · 顺序刷题 · 考试模式 · 错题本</p>
    </a>
  </div>
  <div class="footer">http://localhost:3000 · 管理员: admin/admin-quiz-2024</div>
</body>
</html>
